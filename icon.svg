<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background (maskable safe zone is center 80%) -->
  <rect width="512" height="512" rx="96" fill="#ff8c42"/>
  <circle cx="256" cy="256" r="220" fill="#fef9e7" opacity="0.15"/>

  <!-- Fox head -->
  <g transform="translate(256 280)">
    <!-- Ears outer -->
    <path d="M -100 -80 L -120 -180 L -50 -110 Z" fill="#d97a3c"/>
    <path d="M 100 -80 L 120 -180 L 50 -110 Z" fill="#d97a3c"/>
    <!-- Ears inner -->
    <path d="M -90 -90 L -100 -160 L -65 -105 Z" fill="#3a2e1f"/>
    <path d="M 90 -90 L 100 -160 L 65 -105 Z" fill="#3a2e1f"/>
    <!-- Head -->
    <ellipse cx="0" cy="-20" rx="140" ry="125" fill="#e88a4a"/>
    <!-- Face white -->
    <ellipse cx="0" cy="20" rx="85" ry="75" fill="#fff5e6"/>
    <!-- Cheeks -->
    <circle cx="-72" cy="35" r="20" fill="#ffb8a0" opacity="0.7"/>
    <circle cx="72" cy="35" r="20" fill="#ffb8a0" opacity="0.7"/>
    <!-- Eyes -->
    <circle cx="-45" cy="-30" r="16" fill="#3a2e1f"/>
    <circle cx="45" cy="-30" r="16" fill="#3a2e1f"/>
    <circle cx="-39" cy="-37" r="5" fill="white"/>
    <circle cx="51" cy="-37" r="5" fill="white"/>
    <!-- Nose -->
    <ellipse cx="0" cy="14" rx="13" ry="10" fill="#3a2e1f"/>
    <!-- Mouth -->
    <path d="M 0 26 Q -20 50 -35 40" stroke="#3a2e1f" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M 0 26 Q 20 50 35 40" stroke="#3a2e1f" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>
</svg>
